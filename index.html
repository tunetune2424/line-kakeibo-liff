<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>支出を記録</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f8f8f8;
      min-height: 100vh;
      padding: 20px 16px;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
    .dot { width: 8px; height: 8px; background: #2d9c6e; border-radius: 50%; }
    .header h1 { font-size: 14px; color: #666; }
    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: #999; margin-bottom: 8px; }
    input[type="text"] {
      width: 100%; border: none; outline: none;
      font-size: 16px; color: #222; background: transparent;
    }
    .amount-wrap { display: flex; align-items: center; gap: 8px; }
    .yen { font-size: 18px; color: #999; }
    input[type="number"] {
      width: 100%; border: none; outline: none;
      font-size: 32px; font-weight: bold; color: #222; background: transparent;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type="date"] {
      width: 100%; border: none; outline: none;
      font-size: 15px; color: #222; background: transparent;
    }
    .categories { display: flex; flex-wrap: wrap; gap: 8px; }
    .cat-btn {
      padding: 8px 16px; border-radius: 20px;
      border: 1px solid #e0e0e0; background: white;
      font-size: 14px; color: #444; cursor: pointer; transition: all 0.2s;
    }
    .cat-btn.selected { background: #1a1a2e; color: white; border-color: #1a1a2e; }
    .save-btn {
      width: 100%; padding: 18px; background: #1a1a2e;
      color: white; border: none; border-radius: 12px;
      font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px;
    }
    .save-btn:disabled { opacity: 0.5; }
    .success { display: none; text-align: center; padding: 60px 20px; }
    .success .icon { font-size: 60px; margin-bottom: 16px; }
    .success p { color: #666; font-size: 15px; }
  </style>
</head>
<body>
  <div id="form-view">
    <div class="header">
      <div class="dot"></div>
      <h1>支出を記録</h1>
    </div>
    <div class="card">
      <label>メモ（任意）</label>
      <input type="text" id="memo" placeholder="例：コンビニ">
    </div>
    <div class="card">
      <label>金額</label>
      <div class="amount-wrap">
        <span class="yen">¥</span>
        <input type="number" id="amount" placeholder="0">
      </div>
    </div>
    <div class="card">
      <label>日付</label>
      <input type="date" id="date">
    </div>
    <div class="card">
      <label>カテゴリ</label>
      <div class="categories" id="categories"></div>
    </div>
    <button class="save-btn" id="save-btn" onclick="saveRecord()">記録を保存</button>
  </div>

  <div class="success" id="success-view">
    <div class="icon">✅</div>
    <p id="success-msg"></p>
  </div>

  <script>
    const GAS_URL = 'YOUR_GAS_URL';
    const LIFF_ID = 'YOUR_LIFF_ID';
    const CATEGORIES = ['食費', '交際費', '交通費', '娯楽', '日用品', '固定費'];

    let selectedCategory = '';
    let userId = '';

    // 今日の日付をセット
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;

    // カテゴリボタン生成
    CATEGORIES.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.textContent = cat;
      btn.onclick = () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedCategory = cat;
      };
      document.getElementById('categories').appendChild(btn);
    });

    // LIFF初期化
    liff.init({ liffId: LIFF_ID }).then(() => {
      if (liff.isLoggedIn()) {
        liff.getProfile().then(p => { userId = p.userId; });
      } else {
        liff.login();
      }
    });

    async function saveRecord() {
      const amount = parseInt(document.getElementById('amount').value);
      const memo = document.getElementById('memo').value;
      const date = document.getElementById('date').value;

      if (!amount || amount <= 0) { alert('金額を入力してください'); return; }
      if (!selectedCategory) { alert('カテゴリを選択してください'); return; }

      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = '保存中...';

      try {
        await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({
            source: 'liff', userId, category: selectedCategory, amount, memo, date
          })
        });
        document.getElementById('form-view').style.display = 'none';
        const sv = document.getElementById('success-view');
        sv.style.display = 'block';
        document.getElementById('success-msg').textContent =
          `${selectedCategory} ¥${amount.toLocaleString()} を記録しました`;
        setTimeout(() => liff.closeWindow(), 2000);
      } catch (e) {
        alert('保存に失敗しました');
        btn.disabled = false;
        btn.textContent = '記録を保存';
      }
    }
  </script>
</body>
</html>
